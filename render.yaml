services:
  # The FastAPI Backend and MCP Server combined for the FREE tier
  - type: web
    name: scoutly-ai-free
    env: docker
    plan: free
    dockerfilePath: ./Containerfile.backend
    # This script runs both the MCP server and the FastAPI backend together
    dockerCommand: "bash ./start_render.sh"
    envVars:
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT_NAME
        sync: false
      # LangSmith Tracing
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_ENDPOINT
        value: "https://api.smith.langchain.com"
      - key: LANGCHAIN_PROJECT
        sync: false
      - key: LANGCHAIN_API_KEY
        sync: false
